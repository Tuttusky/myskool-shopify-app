# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "81bdec97937ef80835571f206c16b087"
name = "myskool-2026"
application_url = "https://myskool-shopify-app-production.up.railway.app"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-07"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

[access_scopes]
# write_products: app._index (productCreate, variants); read_orders: app.orders*; write_files: api.upload-photo (Files API)
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "write_products,read_orders,write_files"

[auth]
redirect_urls = [ "https://myskool-shopify-app-production.up.railway.app/auth/callback" ]

# Storefront uploads: https://{shop}/apps/myskool/api/upload-photo → same-origin (avoids CORS "Failed to fetch")
# https://shopify.dev/docs/apps/build/online-store/display-dynamic-data
[app_proxy]
url = "https://myskool-shopify-app-production.up.railway.app"
prefix = "apps"
subpath = "myskool"
